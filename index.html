<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仪表资产扫码管理系统</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="仪表管理">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --success: #0d904f; --warning: #e6a817; --danger: #d93025;
            --bg: #f5f6f8; --card: #ffffff; --text: #1f1f1f; --text-secondary: #5f6368; --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 14px; --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1); --bottom-nav-height: 68px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            -webkit-tap-highlight-color: transparent; padding-bottom: calc(var(--bottom-nav-height) + 20px);
        }
        .top-nav { background:var(--card); border-bottom:1px solid var(--border); padding:12px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
        .top-nav .logo { display:flex; align-items:center; gap:10px; font-size:1.2rem; font-weight:700; color:var(--primary); }
        .top-nav .logo .icon { width:38px; height:38px; background:linear-gradient(135deg,#1a73e8,#4a9af5); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:#fff; }
        .top-nav .stats-badge { display:flex; gap:12px; font-size:0.85rem; color:var(--text-secondary); }
        .top-nav .stats-badge span { background:#f0f4ff; padding:6px 12px; border-radius:20px; font-weight:600; color:var(--primary); white-space:nowrap; font-size:0.8rem; }
        .top-nav .stats-badge .borrowed-count { background:#fff3e0; color:#e67e22; }
        .main-content { max-width:900px; margin:0 auto; padding:16px; }
        .page { display:none; animation:fadeSlideIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeSlideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); transition:var(--transition); }
        .card:active { transform:scale(0.985); }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .card-title { font-size:1.05rem; font-weight:700; display:flex; align-items:center; gap:8px; }
        .meter-item { display:flex; align-items:center; gap:14px; padding:14px 12px; border-radius:var(--radius-sm); background:#fafbfc; border:1px solid #eee; margin-bottom:8px; cursor:pointer; transition:var(--transition); flex-wrap:wrap; }
        .meter-item:hover { background:#f0f4ff; border-color:#c5d5f7; }
        .meter-item .meter-avatar { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,#e8f0fe,#d2e3fc); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; color:#1a73e8; }
        .meter-item .meter-info { flex:1; min-width:140px; }
        .meter-item .meter-name { font-weight:600; font-size:0.95rem; }
        .meter-item .meter-asset { font-size:0.78rem; color:var(--text-secondary); }
        .meter-status-tag { padding:5px 10px; border-radius:15px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
        .tag-in-stock { background:#e6f4ea; color:#0d8040; } .tag-borrowed { background:#fff3e0; color:#c7691a; }
        .tag-expiring { background:#fff3cd; color:#856404; } .tag-expired { background:#f8d7da; color:#721c24; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border-radius:22px; font-size:0.9rem; font-weight:600; border:none; cursor:pointer; transition:var(--transition); white-space:nowrap; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
        .btn:active { transform:scale(0.94); opacity:0.85; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
        .btn-success { background:var(--success); color:#fff; } .btn-danger { background:var(--danger); color:#fff; }
        .btn-sm { padding:6px 14px; font-size:0.8rem; border-radius:16px; }
        .btn-block { width:100%; justify-content:center; }
        .form-group { margin-bottom:14px; }
        .form-label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:5px; color:var(--text-secondary); }
        .form-input,.form-select { width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:2px solid #e0e0e0; font-size:0.95rem; font-family:inherit; background:#fafbfc; color:var(--text); -webkit-appearance:none; }
        .form-input:focus,.form-select:focus { outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px rgba(26,115,232,0.08); }
        #qr-reader { width:100%; max-width:500px; margin:0 auto; border-radius:var(--radius); overflow:hidden; border:2px dashed var(--border); }
        .scan-placeholder { text-align:center; padding:30px 20px; color:var(--text-secondary); background:#fafbfc; border-radius:var(--radius); border:2px dashed #d0d0d0; }
        .toast-container { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { padding:12px 20px; border-radius:25px; color:#fff; font-weight:600; font-size:0.9rem; animation:toastIn 0.35s ease, toastOut 0.35s ease 2.2s forwards; pointer-events:auto; box-shadow:0 8px 24px rgba(0,0,0,0.2); text-align:center; max-width:90vw; }
        .toast.success { background:#0d904f; } .toast.error { background:#d93025; } .toast.info { background:#1a73e8; }
        @keyframes toastIn { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-20px); } }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.06); height:var(--bottom-nav-height); }
        .bottom-nav .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--text-secondary); font-size:0.7rem; font-weight:500; border:none; background:transparent; padding:6px 4px; -webkit-tap-highlight-color:transparent; }
        .bottom-nav .nav-item .nav-icon { font-size:1.5rem; }
        .bottom-nav .nav-item.active { color:var(--primary); }
        .filter-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
        .filter-tag { padding:7px 15px; border-radius:18px; font-size:0.8rem; font-weight:600; cursor:pointer; border:2px solid #e0e0e0; background:#fff; transition:var(--transition); white-space:nowrap; -webkit-user-select:none; }
        .filter-tag.active { background:#e8f0fe; border-color:var(--primary); color:var(--primary); }
        .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
        @media (min-width:768px) { body { padding-bottom:20px; } .bottom-nav { display:none; } .desktop-tabs { display:flex; gap:6px; } .desktop-tab { padding:9px 18px; border-radius:20px; font-weight:600; cursor:pointer; border:2px solid transparent; background:transparent; font-size:0.9rem; } .desktop-tab.active { background:#e8f0fe; border-color:var(--primary); color:var(--primary); } }
        @media (max-width:767px) { .desktop-tabs { display:none; } }
        #scanStatusMsg { text-align:center; margin-top:8px; font-size:0.9rem; min-height:24px; }
        #pwdModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center; }
        #pwdModal.active { display:flex; }
        .pwd-box { background:white; padding:24px; border-radius:16px; width:80%; max-width:300px; box-shadow:0 8px 30px rgba(0,0,0,0.3); }
        .pwd-box h3 { margin-bottom:16px; text-align:center; }
        .record-actions { margin-top:8px; display:flex; gap:8px; }
        .filter-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; align-items:center; }
        .filter-row .form-input, .filter-row .form-select { flex:1; min-width:120px; }
        .meter-item .meter-actions { margin-left:auto; display:flex; gap:6px; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div id="pwdModal">
        <div class="pwd-box">
            <h3>管理员验证</h3>
            <input type="password" class="form-input" id="pwdInput" placeholder="请输入管理密码">
            <p id="pwdError" style="color:#d93025; margin-bottom:8px; display:none;">密码错误</p>
            <div class="btn-row">
                <button class="btn btn-primary" id="pwdConfirm">确认</button>
                <button class="btn btn-outline" id="pwdCancel">取消</button>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <div class="logo"><div class="icon">📊</div><span>仪表管理系统</span></div>
        <div class="stats-badge">
            <span>总计 <b id="totalCount">0</b></span>
            <span>在库 <b id="inStockCount">0</b></span>
            <span class="borrowed-count">借出 <b id="borrowedCount">0</b></span>
        </div>
        <div class="desktop-tabs" id="desktopTabs">
            <button class="desktop-tab active" data-page="page-dashboard">📋 仪表总览</button>
            <button class="desktop-tab" data-page="page-scan">📷 扫码操作</button>
            <button class="desktop-tab" data-page="page-records">📝 借用记录</button>
            <button class="desktop-tab" data-page="page-manage">⚙️ 管理</button>
        </div>
    </div>
    <div class="main-content">
        <div class="page active" id="page-dashboard">
            <div class="filter-tags" id="statusFilter">
                <span class="filter-tag active" data-filter="all">全部</span>
                <span class="filter-tag" data-filter="in-stock">🟢 在库</span>
                <span class="filter-tag" data-filter="borrowed">🟠 借出</span>
                <span class="filter-tag" data-filter="expiring">⏳ 临近有效期</span>
            </div>
            <div class="filter-row">
                <input type="text" class="form-input" id="filterName" placeholder="名称">
                <input type="text" class="form-input" id="filterLocation" placeholder="位置">
                <input type="text" class="form-input" id="filterUser" placeholder="责任人">
                <select class="form-select" id="filterExpireDays">
                    <option value="">有效期（全部）</option>
                    <option value="15">15 天内</option>
                    <option value="30">30 天内</option>
                    <option value="60">60 天内</option>
                </select>
                <button class="btn btn-outline btn-sm" id="btnClearFilter">重置</button>
            </div>
            <div id="meterList"></div>
            <div class="empty-state" id="emptyMeters" style="display:none;"><div>📭</div><p>暂无匹配的仪表</p></div>
        </div>
        <div class="page" id="page-scan">
            <div class="card">
                <div class="card-title">📷 摄像头扫描</div>
                <div id="qr-reader"></div>
                <div class="scan-placeholder" id="scanPlaceholder">点击下方按钮启动摄像头</div>
                <div id="scanStatusMsg"></div>
                <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;">
                    <button class="btn btn-primary" id="btnStartScan">🔍 开始扫描</button>
                    <button class="btn btn-outline" id="btnStopScan" style="display:none;">⏹ 停止扫描</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">⌨️ 手动输入 / 粘贴</div>
                <div style="display:flex;gap:8px;">
                    <input type="text" class="form-input" id="manualQrInput" placeholder="输入资产号或粘贴完整文本" style="flex:1;">
                    <button class="btn btn-primary" id="btnManualQuery">查询</button>
                </div>
                <p style="font-size:0.75rem;color:#999;margin-top:6px;">支持粘贴支付宝扫出的完整信息，自动提取字段</p>
            </div>
            <div class="card" id="scanResultCard" style="display:none;">
                <div class="card-header">
                    <div class="card-title" id="scanResultTitle">📋 扫描结果</div>
                    <span id="scanResultStatus"></span>
                </div>
                <div id="scanResultInfo"></div>
                <div id="scanActionForm"></div>
            </div>
        </div>
        <div class="page" id="page-records">
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <input type="text" class="form-input" id="searchRecord" placeholder="🔍 搜索资产号/借用人..." style="flex:1;">
                <button class="btn btn-outline btn-sm" id="btnExportCSV">📥 导出CSV</button>
            </div>
            <div id="recordList"></div>
            <div class="empty-state" id="emptyRecords" style="display:none;"><div>📝</div><p>暂无借用记录</p></div>
        </div>
        <div class="page" id="page-manage">
            <div class="card">
                <div class="card-title">➕ 添加/编辑仪表</div>
                <form id="meterForm">
                    <input type="hidden" id="editMeterId">
                    <div class="form-group"><label class="form-label">资产号 *</label><input type="text" class="form-input" id="formAssetNo" required placeholder="企业编号"></div>
                    <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="formName"></div>
                    <div class="form-group"><label class="form-label">型号</label><input type="text" class="form-input" id="formModel"></div>
                    <div class="form-group"><label class="form-label">出厂编号</label><input type="text" class="form-input" id="formSerial"></div>
                    <div class="form-group"><label class="form-label">年代</label><input type="text" class="form-input" id="formYear"></div>
                    <div class="form-group"><label class="form-label">使用部门</label><input type="text" class="form-input" id="formDept"></div>
                    <div class="form-group"><label class="form-label">二级部门</label><input type="text" class="form-input" id="formSubDept"></div>
                    <div class="form-group"><label class="form-label">责任人</label><input type="text" class="form-input" id="formUser"></div>
                    <div class="form-group"><label class="form-label">存放位置</label><input type="text" class="form-input" id="formLocation"></div>
                    <div class="form-group"><label class="form-label">有效期</label><input type="date" class="form-input" id="formExpireDate"></div>
                    <div class="form-group"><label class="form-label">技术指标</label><input type="text" class="form-input" id="formSpec"></div>
                    <div class="form-group"><label class="form-label">总价</label><input type="text" class="form-input" id="formPrice"></div>
                    <div class="form-group"><label class="form-label">检定日期</label><input type="date" class="form-input" id="formCalibrationDate"></div>
                    <div class="form-group"><label class="form-label">管理状态</label><input type="text" class="form-input" id="formManageStatus"></div>
                    <div class="form-group"><label class="form-label">技术状态</label><input type="text" class="form-input" id="formTechStatus"></div>
                    <div class="form-group"><label class="form-label">借用部门</label><input type="text" class="form-input" id="formBorrowDept"></div>
                    <div class="form-group"><label class="form-label">借用人</label><input type="text" class="form-input" id="formBorrower"></div>
                    <div class="form-group"><label class="form-label">检定方式</label><input type="text" class="form-input" id="formCalibrationMethod"></div>
                    <div class="form-group"><label class="form-label">管理类别</label><input type="text" class="form-input" id="formManageCategory"></div>
                    <div class="form-group"><label class="form-label">安检</label><input type="text" class="form-input" id="formSecurityCheck"></div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primary" id="btnSaveMeter">💾 保存</button>
                        <button type="button" class="btn btn-outline" id="btnClearForm">🔄 清空</button>
                    </div>
                </form>
            </div>
            <div class="card">
                <div class="card-title">📋 仪表列表（点击编辑，红色删除）</div>
                <div style="margin-bottom:10px;">
                    <input type="text" class="form-input" id="manageSearch" placeholder="🔍 搜索资产号/名称/型号...">
                </div>
                <div id="manageMeterList"></div>
            </div>
            <div class="card">
                <div class="card-title">🛠 批量操作</div>
                <button class="btn btn-outline btn-sm" id="btnAddSample">📦 添加示例</button>
                <button class="btn btn-danger btn-sm" id="btnClearAll" style="margin-left:8px;">🗑 清空全部</button>
                <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none;">
                <button class="btn btn-primary btn-sm" id="btnImportExcel" style="margin-left:8px;">📥 导入Excel</button>
            </div>
        </div>
    </div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="page-dashboard"><span class="nav-icon">📋</span>仪表总览</button>
        <button class="nav-item" data-page="page-scan"><span class="nav-icon">📷</span>扫码操作</button>
        <button class="nav-item" data-page="page-records"><span class="nav-icon">📝</span>借用记录</button>
        <button class="nav-item" data-page="page-manage"><span class="nav-icon">⚙️</span>管理</button>
    </div>
    <script>
        (function() {
            const SUPABASE_URL = 'https://yxzsestiwiznhsecrnec.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4enNlc3Rpd2l6bmhzZWNybmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MTExNTYsImV4cCI6MjEwMDM4NzE1Nn0.VYwxJqNhxYHMpYoJmef1OR9z1SUL-aUvGK9uEgXtnTI';

            async function supabaseFetch(path, method = 'GET', body = null) {
                const url = `${SUPABASE_URL}/rest/v1/${path}`;
                const headers = {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': method === 'GET' ? '' : 'return=representation'
                };
                const options = { method, headers };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(url, options);
                if (!res.ok) throw new Error('网络错误: ' + res.status + ' ' + await res.text());
                if (method === 'DELETE') return null;
                return res.json();
            }

            async function loadMeters() {
                const data = await supabaseFetch('meters?select=data');
                return data.map(row => row.data);
            }

            async function saveMeters(meters) {
                await supabaseFetch('meters?data=not.is.null', 'DELETE');
                if (meters.length === 0) return;
                const batch = meters.map(m => ({ data: m }));
                try { await supabaseFetch('meters', 'POST', batch); } catch (e) {
                    for (const item of batch) { try { await supabaseFetch('meters', 'POST', item); } catch (err) {} }
                }
            }

            async function loadRecords() {
                const data = await supabaseFetch('records?select=data&order=data->>borrowTime.desc');
                return data.map(row => row.data);
            }

            async function saveRecords(records) {
                await supabaseFetch('records?data=not.is.null', 'DELETE');
                if (records.length === 0) return;
                const batch = records.map(r => ({ data: r }));
                try { await supabaseFetch('records', 'POST', batch); } catch (e) {
                    for (const item of batch) { try { await supabaseFetch('records', 'POST', item); } catch (err) {} }
                }
            }

            const ADMIN_PASSWORD = 'admin123';
            let isAdminAuthenticated = false;
            let pendingPageId = null;
            let pendingDeleteId = null;       // 待删除记录ID
            let pendingDeleteMeterId = null; // 待删除仪表资产号
            let meters = [];
            let records = [];

            function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2,6); }
            function formatTime(ts) {
                if (!ts) return '-';
                const d = new Date(ts), pad = n => String(n).padStart(2,'0');
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }
            function showToast(msg, type='info') {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.className = `toast ${type}`; t.textContent = msg;
                c.appendChild(t); setTimeout(() => t.remove(), 2600);
            }

            // 密码弹窗回调（支持管理页进入、记录删除、仪表删除）
            document.getElementById('pwdConfirm').addEventListener('click', async () => {
                const pwd = document.getElementById('pwdInput').value;
                if (pwd !== ADMIN_PASSWORD) { document.getElementById('pwdError').style.display = 'block'; return; }
                document.getElementById('pwdError').style.display = 'none';
                document.getElementById('pwdModal').classList.remove('active');
                if (pendingDeleteId) {
                    await executeDeleteRecord(pendingDeleteId);
                    pendingDeleteId = null;
                } else if (pendingDeleteMeterId) {
                    await executeDeleteMeter(pendingDeleteMeterId);
                    pendingDeleteMeterId = null;
                } else if (pendingPageId) {
                    isAdminAuthenticated = true;
                    switchPage(pendingPageId);
                }
            });
            document.getElementById('pwdCancel').addEventListener('click', () => {
                document.getElementById('pwdModal').classList.remove('active');
                pendingDeleteId = null;
                pendingDeleteMeterId = null;
                pendingPageId = null;
            });

            function showPwdModalForRecord(id) {
                pendingDeleteId = id;

            async function executeDeleteRecord(recordId) {
                const idx = records.findIndex(r => r.id === recordId);
                if (idx === -1) return;
                const rec = records[idx];
                if (rec.status === 'borrowed') {
                    const meter = meters.find(m => m.assetNo === rec.assetNo);
                    if (meter) meter.status = 'in-stock';
                }
                records.splice(idx, 1);
                await saveRecords(records); await saveMeters(meters);
                updateStats(); renderDashboard(); renderRecords();
                showToast('记录已删除', 'success');
            }

            async function executeDeleteMeter(assetNo) {
                const meterIdx = meters.findIndex(m => m.assetNo === assetNo);
                if (meterIdx === -1) { showToast('仪表不存在', 'error'); return; }
                // 删除所有关联的借用记录
                records = records.filter(r => r.assetNo !== assetNo);
                // 删除仪表
                meters.splice(meterIdx, 1);
                await saveMeters(meters);
                await saveRecords(records);
                updateStats();
                renderDashboard();
                renderManageMeterList();
                renderRecords();
                showToast('仪表已删除', 'success');

            function getExpireStatus(m) {
                if (!m.expireDate) return null;
                const now = new Date();
                const expire = new Date(m.expireDate);
                const diffDays = Math.ceil((expire - now) / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return 'expired';
                if (diffDays <= 30) return 'expiring';
                return null;
            }

            function renderDashboard() {
                const listEl = document.getElementById('meterList'), emptyEl = document.getElementById('emptyMeters');
                const statusFilter = document.querySelector('#statusFilter .filter-tag.active')?.dataset.filter || 'all';
                const nameFilter = document.getElementById('filterName').value.trim().toLowerCase();
                const locationFilter = document.getElementById('filterLocation').value.trim().toLowerCase();
                const userFilter = document.getElementById('filterUser').value.trim().toLowerCase();
                const expireDays = document.getElementById('filterExpireDays').value;

                let filtered = meters;
                if (statusFilter === 'in-stock') filtered = filtered.filter(m => m.status === 'in-stock');
                else if (statusFilter === 'borrowed') filtered = filtered.filter(m => m.status === 'borrowed');
                else if (statusFilter === 'expiring') filtered = filtered.filter(m => {
                    const status = getExpireStatus(m);
                    return status === 'expiring' || status === 'expired';
                });
                if (nameFilter) filtered = filtered.filter(m => m.name && m.name.toLowerCase().includes(nameFilter));
                if (locationFilter) filtered = filtered.filter(m => m.location && m.location.toLowerCase().includes(locationFilter));
                if (userFilter) filtered = filtered.filter(m => m.user && m.user.toLowerCase().includes(userFilter));
                if (expireDays) {
                    const days = parseInt(expireDays);
                    filtered = filtered.filter(m => {
                        if (!m.expireDate) return false;
                        const now = new Date();
                        const expire = new Date(m.expireDate);
                        const diff = Math.ceil((expire - now) / (1000 * 60 * 60 * 24));
                        return diff >= 0 && diff <= days;
                    });
                }

                if (filtered.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; }
                else {
                    emptyEl.style.display = 'none';
                    listEl.innerHTML = filtered.map(m => {
                        const expireStatus = getExpireStatus(m);
                        let expireTag = '';
                        if (expireStatus === 'expired') expireTag = '<span class="meter-status-tag tag-expired">已过期</span>';
                        else if (expireStatus === 'expiring') expireTag = '<span class="meter-status-tag tag-expiring">即将过期</span>';
                        return `<div class="meter-item" data-asset="${m.assetNo}">
                            <div class="meter-avatar">📟</div>
                            <div class="meter-info">
                                <div class="meter-name">${m.name||'未命名'} ${expireTag}</div>
                                <div class="meter-asset">${m.assetNo} | ${m.model||''} | ${m.location||''}</div>
                            </div>
                            <span class="meter-status-tag ${m.status==='in-stock'?'tag-in-stock':'tag-borrowed'}">${m.status==='in-stock'?'在库':'借出'}</span>
                        </div>`;
                    }).join('');
                    listEl.querySelectorAll('.meter-item').forEach(item => {
                        item.addEventListener('click', () => {
                            document.getElementById('manualQrInput').value = item.dataset.asset;
                            switchPage('page-scan');
                            processAssetQuery(item.dataset.asset);
                        });
                    });
                }
                updateStats();
            }

            function extractFields(text) {
                const clean = text.replace(/<br\s*\/?>/gi, '\n').replace(/<\/?[^>]+(>|$)/g, '');
                const fields = {};
                const patterns = {
                    assetNo: /企业编号[：:]\s*(\S+)/i,
                    name: /名称[：:]\s*(.+)/i,
                    model: /型号[：:]\s*(.+)/i,
                    serial: /(?:出厂编号|序号)[：:]\s*(.+)/i,
                    year: /年代[：:]\s*(.+)/i,
                    dept: /使用部门[：:]\s*(.+)/i,
                    subDept: /二级部门[：:]\s*(.+)/i,
                    user: /(?:使用人|责任人)[：:]\s*(.+)/i,
                    location: /(?:位置|存放位置)[：:]\s*(.+)/i,
                    expireDate: /有效期[：:]\s*(.+)/i,
                    spec: /技术指标[：:]\s*(.+)/i,
                    price: /总价[：:]\s*(.+)/i,
                    calibrationDate: /检定日期[：:]\s*(.+)/i,
                    manageStatus: /管理状态[：:]\s*(.+)/i,
                    techStatus: /技术状态[：:]\s*(.+)/i,
                    borrowDept: /借用部门[：:]\s*(.+)/i,
                    borrower: /借用人[：:]\s*(.+)/i,
                    calibrationMethod: /检定方式[：:]\s*(.+)/i,
                    manageCategory: /管理类别[：:]\s*(.+)/i,
                    securityCheck: /安检[：:]\s*(.+)/i
                };
                for (const [key, regex] of Object.entries(patterns)) {
                    const match = clean.match(regex);
                    if (match) fields[key] = match[1].trim();
                }
                return fields;
            }

            async function processSingleAsset(assetNo, extraFields = {}) {
                let meter = meters.find(m => m.assetNo === assetNo);
                if (!meter) {
                    meter = {
                        assetNo: assetNo,
                        name: extraFields.name || '',
                        model: extraFields.model || '',
                        serial: extraFields.serial || '',
                        year: extraFields.year || '',
                        dept: extraFields.dept || '',
                        subDept: extraFields.subDept || '',
                        user: extraFields.user || '',
                        location: extraFields.location || '',
                        expireDate: extraFields.expireDate || '',
                        spec: extraFields.spec || '',
                        price: extraFields.price || '',
                        calibrationDate: extraFields.calibrationDate || '',
                        manageStatus: extraFields.manageStatus || '',
                        techStatus: extraFields.techStatus || '',
                        borrowDept: extraFields.borrowDept || '',
                        borrower: extraFields.borrower || '',
                        calibrationMethod: extraFields.calibrationMethod || '',
                        manageCategory: extraFields.manageCategory || '',
                        securityCheck: extraFields.securityCheck || '',
                        status: 'in-stock'
                    };
                    meters.push(meter);
                    await saveMeters(meters);
                    updateStats(); renderDashboard();
                    showToast('已添加仪表：' + assetNo, 'success');
                } else {
                    let updated = false;
                    for (const key of ['name','model','serial','year','dept','subDept','user','location','expireDate','spec','price','calibrationDate','manageStatus','techStatus','borrowDept','borrower','calibrationMethod','manageCategory','securityCheck']) {
                        if (extraFields[key] && !meter[key]) {
                            meter[key] = extraFields[key];
                            updated = true;
                        }
                    }
                    if (updated) { await saveMeters(meters); showToast('仪表信息已更新', 'info'); }
                }
                const card = document.getElementById('scanResultCard');
                card.style.display = 'block';
                document.getElementById('scanResultTitle').textContent = `📟 ${meter.name || meter.assetNo}`;
                document.getElementById('scanResultStatus').innerHTML = meter.status === 'in-stock' ? '<span class="tag-in-stock">在库</span>' : '<span class="tag-borrowed">借出中</span>';
                document.getElementById('scanResultInfo').innerHTML = `
                    <p><strong>资产号：</strong>${meter.assetNo}</p>
                    <p><strong>名称：</strong>${meter.name||'-'}</p>
                    <p><strong>型号：</strong>${meter.model||'-'}</p>
                    <p><strong>位置：</strong>${meter.location||'-'}</p>
                    <p><strong>有效期：</strong>${meter.expireDate||'-'}</p>`;
                const formDiv = document.getElementById('scanActionForm');
                if (meter.status === 'in-stock') {
                    formDiv.innerHTML = `

                            <button class="btn btn-primary btn-block btn-borrow-submit">✅ 确认借用</button>
                        </div>`;
                    formDiv.querySelector('.btn-borrow-submit').onclick = async () => {
                        if (meter.status !== 'in-stock') { showToast('该仪表已被借用', 'error'); return; }
                        const name = formDiv.querySelector('.borrow-name').value.trim();
                        const id = formDiv.querySelector('.borrow-id').value.trim();
                        const loc = formDiv.querySelector('.borrow-location').value.trim();
                        if (!name || !loc) { showToast('请填写姓名和地点', 'error'); return; }
                        meter.status = 'borrowed'; meter.location = loc;
                        records.unshift({
                            id: generateId(), meterId: meter.assetNo, assetNo: meter.assetNo, meterName: meter.name,
                            borrowerId: id, borrowerName: name, borrowLocation: loc, borrowTime: Date.now(),
                            returnTime: null, status: 'borrowed'
                        });
                        await saveMeters(meters); await saveRecords(records);
                        showToast('借用成功', 'success');
                        processAssetQuery(meter.assetNo);
                    };
                } else {
                    const activeRec = records.find(r => r.assetNo === meter.assetNo && r.status === 'borrowed');
                    formDiv.innerHTML = `
                        <p><strong>当前借用人：</strong>${activeRec?.borrowerName || '未知'}</p>
                        <button class="btn btn-success btn-block btn-return-submit">🔄 归还</button>`;
                    formDiv.querySelector('.btn-return-submit').onclick = async () => {
                        meter.status = 'in-stock';
                        if (activeRec) { activeRec.returnTime = Date.now(); activeRec.status = 'returned'; }
                        await saveMeters(meters); await saveRecords(records);
                        showToast('归还成功', 'success');
                        processAssetQuery(meter.assetNo);
                    };
                }
            }

            async function processAssetQuery(rawText) {
                rawText = rawText.trim();
                if (!rawText) { showToast('内容为空', 'error'); return; }
                const fields = extractFields(rawText);
                const assetNos = fields.assetNo ? [fields.assetNo] : [];
                if (assetNos.length === 0 && !rawText.includes('\n') && !rawText.includes('<br')) {
                    assetNos.push(rawText);
                }
                for (const assetNo of assetNos) {
                    await processSingleAsset(assetNo, fields);
                }
            }

            function excelSerialToDate(serial) {
                if (typeof serial === 'number') {
                    const utcDays = Math.floor(serial - 25569);
                    const date = new Date(utcDays * 86400 * 1000);
                    return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
                }
                return serial;
            }

                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
                    if (rows.length < 2) { showToast('无数据', 'error'); return; }
                    const headers = rows[0].map(h => String(h).trim());
                    const newMeters = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || !row.length) continue;
                        const obj = { status: 'in-stock' };
                        headers.forEach((h, idx) => {
                            const val = row[idx] !== undefined ? String(row[idx]).trim() : '';
                            if (h.includes('企业编号')) obj.assetNo = val;
                            else if (h.includes('型号')) obj.model = val;
                            else if (h.includes('名称')) obj.name = val;
                            else if (h.includes('出厂编号') || h.includes('序号')) obj.serial = val;
                            else if (h.includes('技术指标')) obj.spec = val;
                            else if (h.includes('位置')) obj.location = val;
                            else if (h.includes('总价')) obj.price = val;
                            else if (h.includes('年代')) obj.year = val;
                            else if (h.includes('检定日期')) obj.calibrationDate = val;
                            else if (h.includes('有效期')) obj.expireDate = val ? excelSerialToDate(val) : '';
                            else if (h.includes('管理状态')) obj.manageStatus = val;
                            else if (h.includes('技术状态')) obj.techStatus = val;
                            else if (h.includes('使用部门')) obj.dept = val;
                            else if (h.includes('二级部门')) obj.subDept = val;
                            else if (h.includes('责任人')) obj.user = val;
                            else if (h.includes('借用部门')) obj.borrowDept = val;
                            else if (h.includes('借用人')) obj.borrower = val;
                            else if (h.includes('检定方式')) obj.calibrationMethod = val;
                            else if (h.includes('管理类别')) obj.manageCategory = val;
                            else if (h.includes('安检')) obj.securityCheck = val;
                        });
                        if (obj.assetNo) newMeters.push(obj);
                    }
                    let added = 0, skipped = 0;
                    for (const nm of newMeters) {
                        if (meters.some(m => m.assetNo === nm.assetNo)) skipped++;
                        else { meters.push(nm); added++; }
                    }
                    await saveMeters(meters);
                    updateStats(); renderManageMeterList(); renderDashboard();
                    showToast(`导入完成：新增${added}台，跳过${skipped}台重复`, 'success');
                };
                reader.readAsArrayBuffer(file);
            });

            async function initApp() {
                meters = await loadMeters();
                records = await loadRecords();
                if (meters.length === 0) {
                    meters.push({ assetNo: 'METER-001', name: '精密压力表', model: 'A型', location: '实验室', status: 'in-stock' });
                    await saveMeters(meters);
                }
                updateStats(); renderDashboard(); renderRecords(); renderManageMeterList();
                const params = new URLSearchParams(window.location.search);
                const asset = params.get('asset');
                if (asset) { switchPage('page-scan'); document.getElementById('manualQrInput').value = asset; processAssetQuery(asset); }
            }
            window.addEventListener('DOMContentLoaded', initApp);
        })();
    </script>
</body>
