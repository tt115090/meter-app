<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仪表资产扫码管理系统</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="仪表管理">
    <link rel="manifest" href="manifest.json">
    <!-- CloudBase SDK -->
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/1.7.1/cloudbase.full.js"></script>
    <!-- 二维码扫描库 -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --success: #0d904f; --warning: #e6a817; --danger: #d93025;
            --bg: #f5f6f8; --card: #ffffff; --text: #1f1f1f; --text-secondary: #5f6368; --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 14px; --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1); --bottom-nav-height: 68px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            -webkit-tap-highlight-color: transparent; padding-bottom: calc(var(--bottom-nav-height) + 20px);
        }
        .top-nav { background:var(--card); border-bottom:1px solid var(--border); padding:12px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
        .top-nav .logo { display:flex; align-items:center; gap:10px; font-size:1.2rem; font-weight:700; color:var(--primary); }
        .top-nav .logo .icon { width:38px; height:38px; background:linear-gradient(135deg,#1a73e8,#4a9af5); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:#fff; }
        .top-nav .stats-badge { display:flex; gap:12px; font-size:0.85rem; color:var(--text-secondary); }
        .top-nav .stats-badge span { background:#f0f4ff; padding:6px 12px; border-radius:20px; font-weight:600; color:var(--primary); white-space:nowrap; font-size:0.8rem; }
        .top-nav .stats-badge .borrowed-count { background:#fff3e0; color:#e67e22; }
        .main-content { max-width:800px; margin:0 auto; padding:16px; }
        .page { display:none; animation:fadeSlideIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeSlideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .card { background:var(--card); border-radius:var(--radius); padding:18px 16px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); transition:var(--transition); }
        .card:active { transform:scale(0.985); }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .card-title { font-size:1.05rem; font-weight:700; display:flex; align-items:center; gap:8px; }
        .dot { width:10px; height:10px; border-radius:50%; display:inline-block; flex-shrink:0; }
        .dot.in-stock { background:#0d904f; } .dot.borrowed { background:#e67e22; animation:pulse 1.6s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
        .meter-item { display:flex; align-items:center; gap:14px; padding:14px 12px; border-radius:var(--radius-sm); background:#fafbfc; border:1px solid #eee; margin-bottom:8px; cursor:pointer; transition:var(--transition); flex-wrap:wrap; }
        .meter-item:hover { background:#f0f4ff; border-color:#c5d5f7; }
        .meter-item .meter-avatar { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,#e8f0fe,#d2e3fc); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; color:#1a73e8; }
        .meter-item .meter-info { flex:1; min-width:140px; }
        .meter-item .meter-name { font-weight:600; font-size:0.95rem; }
        .meter-item .meter-asset { font-size:0.78rem; color:var(--text-secondary); }
        .meter-status-tag { padding:5px 10px; border-radius:15px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
        .tag-in-stock { background:#e6f4ea; color:#0d8040; } .tag-borrowed { background:#fff3e0; color:#c7691a; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border-radius:22px; font-size:0.9rem; font-weight:600; border:none; cursor:pointer; transition:var(--transition); white-space:nowrap; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
        .btn:active { transform:scale(0.94); opacity:0.85; }
        .btn-primary { background:var(--primary); color:#fff; box-shadow:0 3px 10px rgba(26,115,232,0.3); }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
        .btn-success { background:var(--success); color:#fff; } .btn-danger { background:var(--danger); color:#fff; }
        .btn-sm { padding:6px 14px; font-size:0.8rem; border-radius:16px; }
        .btn-block { width:100%; justify-content:center; }
        .form-group { margin-bottom:14px; }
        .form-label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:5px; color:var(--text-secondary); }
        .form-input,.form-select,.form-textarea { width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:2px solid #e0e0e0; font-size:0.95rem; font-family:inherit; background:#fafbfc; color:var(--text); -webkit-appearance:none; appearance:none; }
        .form-input:focus,.form-select:focus,.form-textarea:focus { outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px rgba(26,115,232,0.08); }
        #qr-reader { width:100%; max-width:500px; margin:0 auto; border-radius:var(--radius); overflow:hidden; border:2px dashed var(--border); }
        .scan-placeholder { text-align:center; padding:30px 20px; color:var(--text-secondary); background:#fafbfc; border-radius:var(--radius); border:2px dashed #d0d0d0; }
        .toast-container { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { padding:12px 20px; border-radius:25px; color:#fff; font-weight:600; font-size:0.9rem; animation:toastIn 0.35s ease, toastOut 0.35s ease 2.2s forwards; pointer-events:auto; box-shadow:0 8px 24px rgba(0,0,0,0.2); text-align:center; max-width:90vw; }
        .toast.success { background:#0d904f; } .toast.error { background:#d93025; } .toast.info { background:#1a73e8; }
        @keyframes toastIn { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-20px); } }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.06); height:var(--bottom-nav-height); }
        .bottom-nav .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--text-secondary); font-size:0.7rem; font-weight:500; border:none; background:transparent; padding:6px 4px; -webkit-tap-highlight-color:transparent; }
        .bottom-nav .nav-item .nav-icon { font-size:1.5rem; }
        .bottom-nav .nav-item.active { color:var(--primary); }
        .filter-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
        .filter-tag { padding:7px 15px; border-radius:18px; font-size:0.8rem; font-weight:600; cursor:pointer; border:2px solid #e0e0e0; background:#fff; transition:var(--transition); white-space:nowrap; -webkit-user-select:none; user-select:none; }
        .filter-tag.active { background:#e8f0fe; border-color:var(--primary); color:var(--primary); }
        .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
        @media (min-width:768px) { body { padding-bottom:20px; } .bottom-nav { display:none; } .desktop-tabs { display:flex; gap:6px; flex-wrap:wrap; } .desktop-tab { padding:9px 18px; border-radius:20px; font-weight:600; cursor:pointer; border:2px solid transparent; background:transparent; font-size:0.9rem; transition:var(--transition); } .desktop-tab.active { background:#e8f0fe; border-color:var(--primary); color:var(--primary); } }
        @media (max-width:767px) { .desktop-tabs { display:none; } }
        #scanStatusMsg { text-align:center; margin-top:8px; font-size:0.9rem; min-height:24px; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="top-nav">
        <div class="logo"><div class="icon">📊</div><span>仪表管理系统</span></div>
        <div class="stats-badge">
            <span>总计 <b id="totalCount">0</b></span>
            <span>在库 <b id="inStockCount">0</b></span>
            <span class="borrowed-count">借出 <b id="borrowedCount">0</b></span>
        </div>
        <div class="desktop-tabs" id="desktopTabs">
            <button class="desktop-tab active" data-page="page-dashboard">📋 仪表总览</button>
            <button class="desktop-tab" data-page="page-scan">📷 扫码操作</button>
            <button class="desktop-tab" data-page="page-records">📝 借用记录</button>
            <button class="desktop-tab" data-page="page-manage">⚙️ 管理</button>
        </div>
    </div>
    <div class="main-content">
        <div class="page active" id="page-dashboard">
            <div class="filter-tags">
                <span class="filter-tag active" data-filter="all">全部</span>
                <span class="filter-tag" data-filter="in-stock">🟢 在库</span>
                <span class="filter-tag" data-filter="borrowed">🟠 借出</span>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;"><input type="text" class="form-input" id="searchMeter" placeholder="🔍 搜索资产号/名称/责任人..." style="flex:1;"></div>
            <div id="meterList"></div>
            <div class="empty-state" id="emptyMeters" style="display:none;"><div>📭</div><p>暂无匹配的仪表</p></div>
        </div>
        <div class="page" id="page-scan">
            <div class="card">
                <div class="card-title">📷 摄像头扫描</div>
                <div id="qr-reader"></div>
                <div class="scan-placeholder" id="scanPlaceholder">点击下方按钮启动摄像头</div>
                <div id="scanStatusMsg"></div>
                <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;">
                    <button class="btn btn-primary" id="btnStartScan">🔍 开始扫描</button>
                    <button class="btn btn-outline" id="btnStopScan" style="display:none;">⏹ 停止扫描</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">⌨️ 手动输入 / 粘贴</div>
                <div style="display:flex;gap:8px;">
                    <input type="text" class="form-input" id="manualQrInput" placeholder="输入资产号或粘贴完整文本" style="flex:1;">
                    <button class="btn btn-primary" id="btnManualQuery">查询</button>
                </div>
                <p style="font-size:0.75rem;color:#999;margin-top:6px;">支持粘贴支付宝扫出的完整信息，自动提取字段</p>
            </div>
            <div class="card" id="scanResultCard" style="display:none;">
                <div class="card-header">
                    <div class="card-title" id="scanResultTitle">📋 扫描结果</div>
                    <span id="scanResultStatus"></span>
                </div>
                <div id="scanResultInfo"></div>
                <div id="scanActionForm"></div>
            </div>
        </div>
        <div class="page" id="page-records">
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <input type="text" class="form-input" id="searchRecord" placeholder="🔍 搜索资产号/借用人..." style="flex:1;">
                <button class="btn btn-outline btn-sm" id="btnExportCSV">📥 导出CSV</button>
            </div>
            <div id="recordList"></div>
            <div class="empty-state" id="emptyRecords" style="display:none;"><div>📝</div><p>暂无借用记录</p></div>
        </div>
        <div class="page" id="page-manage">
            <div class="card">
                <div class="card-title">➕ 添加/编辑仪表</div>
                <form id="meterForm">
                    <input type="hidden" id="editMeterId">
                    <div class="form-group"><label class="form-label">资产号 *</label><input type="text" class="form-input" id="formAssetNo" required placeholder="企业编号"></div>
                    <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="formName" placeholder="仪表名称"></div>
                    <div class="form-group"><label class="form-label">型号</label><input type="text" class="form-input" id="formModel" placeholder="型号"></div>
                    <div class="form-group"><label class="form-label">序号</label><input type="text" class="form-input" id="formSerial" placeholder="序号"></div>
                    <div class="form-group"><label class="form-label">年代</label><input type="text" class="form-input" id="formYear" placeholder="年代"></div>
                    <div class="form-group"><label class="form-label">使用部门</label><input type="text" class="form-input" id="formDept" placeholder="使用部门"></div>
                    <div class="form-group"><label class="form-label">使用人</label><input type="text" class="form-input" id="formUser" placeholder="使用人"></div>
                    <div class="form-group"><label class="form-label">存放位置</label><input type="text" class="form-input" id="formLocation" placeholder="当前位置"></div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primary" id="btnSaveMeter">💾 保存</button>
                        <button type="button" class="btn btn-outline" id="btnClearForm">🔄 清空</button>
                    </div>
                </form>
            </div>
            <div class="card">
                <div class="card-title">📋 仪表列表（点击编辑）</div>
                <div id="manageMeterList"></div>
            </div>
            <div class="card">
                <div class="card-title">🛠 批量操作</div>
                <button class="btn btn-outline btn-sm" id="btnAddSample">📦 添加示例仪表</button>
                <button class="btn btn-danger btn-sm" id="btnClearAll" style="margin-left:8px;">🗑 清空所有数据</button>
            </div>
        </div>
    </div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="page-dashboard"><span class="nav-icon">📋</span>仪表总览</button>
        <button class="nav-item" data-page="page-scan"><span class="nav-icon">📷</span>扫码操作</button>
        <button class="nav-item" data-page="page-records"><span class="nav-icon">📝</span>借用记录</button>
        <button class="nav-item" data-page="page-manage"><span class="nav-icon">⚙️</span>管理</button>
    </div>
    <script>
        (function() {
            // ---------- CloudBase 初始化（使用你的环境ID）----------
            const app = cloudbase.init({ env: 'meter-d1g5i97q97065b6e3' });
            const db = app.database();
            const _ = db.command;
            const meterCollection = db.collection('meters');
            const recordCollection = db.collection('records');

            // 管理密码
            const ADMIN_PASSWORD = 'admin123';
            let isAdminAuthenticated = false;

            // ---------- 云端数据操作 ----------
            async function loadMeters() {
                try {
                    const res = await meterCollection.limit(1000).get();
                    return res.data || [];
                } catch (e) {
                    showToast('加载仪表失败：' + e.message, 'error');
                    return [];
                }
            }

            async function saveMeters(meters) {
                try {
                    // 清空集合
                    const existing = await meterCollection.get();
                    if (existing.data.length > 0) {
                        const ids = existing.data.map(doc => doc._id);
                        // 分批删除，每次最多100条
                        for (let i = 0; i < ids.length; i += 100) {
                            const batch = ids.slice(i, i + 100);
                            await Promise.all(batch.map(id => meterCollection.doc(id).remove()));
                        }
                    }
                    // 分批添加
                    for (let i = 0; i < meters.length; i += 100) {
                        await Promise.all(meters.slice(i, i + 100).map(m => meterCollection.add(m)));
                    }
                } catch (e) {
                    showToast('保存仪表失败：' + e.message, 'error');
                }
            }

            async function loadRecords() {
                try {
                    const res = await recordCollection.orderBy('borrowTime', 'desc').limit(1000).get();
                    return res.data || [];
                } catch (e) {
                    showToast('加载记录失败：' + e.message, 'error');
                    return [];
                }
            }

            async function saveRecords(records) {
                try {
                    const existing = await recordCollection.get();
                    if (existing.data.length > 0) {
                        const ids = existing.data.map(doc => doc._id);
                        for (let i = 0; i < ids.length; i += 100) {
                            const batch = ids.slice(i, i + 100);
                            await Promise.all(batch.map(id => recordCollection.doc(id).remove()));
                        }
                    }
                    for (let i = 0; i < records.length; i += 100) {
                        await Promise.all(records.slice(i, i + 100).map(r => recordCollection.add(r)));
                    }
                } catch (e) {
                    showToast('保存记录失败：' + e.message, 'error');
                }
            }

            // ---------- 全局变量 ----------
            let meters = [];
            let records = [];

            // 工具函数
            function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2,6); }
            function formatTime(ts) {
                if (!ts) return '-';
                const d = new Date(ts), pad = n => String(n).padStart(2,'0');
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }
            function showToast(msg, type='info') {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.className = `toast ${type}`; t.textContent = msg;
                c.appendChild(t); setTimeout(() => t.remove(), 2600);
            }

            // ---------- 页面导航 ----------
            function switchPage(pageId) {
                if (pageId === 'page-manage' && !isAdminAuthenticated) {
                    const pwd = prompt('请输入管理密码：');
                    if (pwd === null) {
                        pageId = 'page-dashboard';
                    } else if (pwd !== ADMIN_PASSWORD) {
                        showToast('密码错误', 'error');
                        pageId = 'page-dashboard';
                    } else {
                        isAdminAuthenticated = true;
                    }
                }
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                document.querySelectorAll('.desktop-tab').forEach(t => t.classList.remove('active'));
                const dt = document.querySelector(`.desktop-tab[data-page="${pageId}"]`);
                if (dt) dt.classList.add('active');
                document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
                const bn = document.querySelector(`.bottom-nav .nav-item[data-page="${pageId}"]`);
                if (bn) bn.classList.add('active');
                if (pageId === 'page-dashboard') renderDashboard();
                if (pageId === 'page-records') renderRecords();
                if (pageId === 'page-manage') renderManageMeterList();
            }
            document.getElementById('desktopTabs').addEventListener('click', e => {
                const tab = e.target.closest('.desktop-tab');
                if (tab) switchPage(tab.dataset.page);
            });
            document.getElementById('bottomNav').addEventListener('click', e => {
                const item = e.target.closest('.nav-item');
                if (item) switchPage(item.dataset.page);
            });

            function updateStats() {
                document.getElementById('totalCount').textContent = meters.length;
                document.getElementById('inStockCount').textContent = meters.filter(m => m.status === 'in-stock').length;
                document.getElementById('borrowedCount').textContent = meters.filter(m => m.status === 'borrowed').length;
            }

            // ---------- 仪表总览 ----------
            function renderDashboard(filter='all', searchTerm='') {
                const listEl = document.getElementById('meterList'), emptyEl = document.getElementById('emptyMeters');
                let filtered = meters;
                if (filter === 'in-stock') filtered = filtered.filter(m => m.status === 'in-stock');
                if (filter === 'borrowed') filtered = filtered.filter(m => m.status === 'borrowed');
                if (searchTerm) {
                    const t = searchTerm.toLowerCase();
                    filtered = filtered.filter(m => m.assetNo.toLowerCase().includes(t) || m.name.toLowerCase().includes(t) || m.user.toLowerCase().includes(t));
                }
                if (filtered.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; }
                else {
                    emptyEl.style.display = 'none';
                    listEl.innerHTML = filtered.map(m => `
                        <div class="meter-item" data-asset="${m.assetNo}">
                            <div class="meter-avatar">📟</div>
                            <div class="meter-info"><div class="meter-name">${m.name||'未命名'}</div><div class="meter-asset">${m.assetNo} | ${m.model||''} | ${m.user||''}</div></div>
                            <span class="meter-status-tag ${m.status==='in-stock'?'tag-in-stock':'tag-borrowed'}">${m.status==='in-stock'?'在库':'借出'}</span>
                        </div>`).join('');
                    listEl.querySelectorAll('.meter-item').forEach(item => {
                        item.addEventListener('click', () => {
                            document.getElementById('manualQrInput').value = item.dataset.asset;
                            switchPage('page-scan');
                            processAssetQuery(item.dataset.asset);
                        });
                    });
                }
                updateStats();
            }
            document.querySelector('#page-dashboard .filter-tags').addEventListener('click', e => {
                if (e.target.classList.contains('filter-tag')) {
                    document.querySelectorAll('#page-dashboard .filter-tag').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    renderDashboard(e.target.dataset.filter, document.getElementById('searchMeter').value);
                }
            });
            document.getElementById('searchMeter').addEventListener('input', e => {
                const f = document.querySelector('#page-dashboard .filter-tag.active')?.dataset.filter || 'all';
                renderDashboard(f, e.target.value);
            });

            // ---------- 字段提取 ----------
            function extractFields(text) {
                const fields = {};
                const idMatch = text.match(/企业编号[：:]\s*(\S+)/);
                if (idMatch) fields.assetNo = idMatch[1].trim();
                const nameMatch = text.match(/名称[：:]\s*(\S+)/);
                if (nameMatch) fields.name = nameMatch[1].trim();
                const modelMatch = text.match(/型号[：:]\s*(\S+)/);
                if (modelMatch) fields.model = modelMatch[1].trim();
                const serialMatch = text.match(/序号[：:]\s*(\S+)/);
                if (serialMatch) fields.serial = serialMatch[1].trim();
                const yearMatch = text.match(/年代[：:]\s*(\S+)/);
                if (yearMatch) fields.year = yearMatch[1].trim();
                const deptMatch = text.match(/使用部门[：:]\s*(\S+)/);
                if (deptMatch) fields.dept = deptMatch[1].trim();
                const userMatch = text.match(/使用人[：:]\s*(\S+)/);
                if (userMatch) fields.user = userMatch[1].trim();
                return fields;
            }

            // ---------- 处理查询 ----------
            async function processAssetQuery(rawText) {
                try {
                    rawText = rawText.trim();
                    if (!rawText) { showToast('内容为空', 'error'); return; }
                    const fields = extractFields(rawText);
                    let assetNo = fields.assetNo || rawText;
                    if (!fields.assetNo) {
                        try { const j = JSON.parse(rawText); if (j.assetNo) assetNo = j.assetNo; } catch(e) {}
                    }
                    let meter = meters.find(m => m.assetNo === assetNo);
                    if (!meter) {
                        meter = {
                            assetNo: assetNo,
                            name: fields.name || '',
                            model: fields.model || '',
                            serial: fields.serial || '',
                            year: fields.year || '',
                            dept: fields.dept || '',
                            user: fields.user || '',
                            location: '',
                            status: 'in-stock'
                        };
                        meters.push(meter);
                        await saveMeters(meters);
                        updateStats();
                        renderDashboard();
                        showToast('自动添加了新仪表：' + assetNo, 'success');
                    } else {
                        let updated = false;
                        if (fields.name && !meter.name) { meter.name = fields.name; updated = true; }
                        if (fields.model && !meter.model) { meter.model = fields.model; updated = true; }
                        if (fields.serial && !meter.serial) { meter.serial = fields.serial; updated = true; }
                        if (fields.year && !meter.year) { meter.year = fields.year; updated = true; }
                        if (fields.dept && !meter.dept) { meter.dept = fields.dept; updated = true; }
                        if (fields.user && !meter.user) { meter.user = fields.user; updated = true; }
                        if (updated) {
                            await saveMeters(meters);
                            showToast('仪表信息已更新', 'info');
                        }
                    }

                    const card = document.getElementById('scanResultCard');
                    card.style.display = 'block';
                    document.getElementById('scanResultTitle').textContent = `📟 ${meter.name || meter.assetNo}`;
                    document.getElementById('scanResultStatus').innerHTML = meter.status === 'in-stock' ? '<span class="tag-in-stock">在库</span>' : '<span class="tag-borrowed">借出中</span>';
                    document.getElementById('scanResultInfo').innerHTML = `
                        <p><strong>资产号：</strong>${meter.assetNo}</p>
                        <p><strong>名称：</strong>${meter.name||'-'}</p>
                        <p><strong>型号：</strong>${meter.model||'-'}</p>
                        <p><strong>序号：</strong>${meter.serial||'-'}</p>
                        <p><strong>年代：</strong>${meter.year||'-'}</p>
                        <p><strong>使用部门：</strong>${meter.dept||'-'}</p>
                        <p><strong>使用人：</strong>${meter.user||'-'}</p>
                        <p><strong>位置：</strong>${meter.location||'-'}</p>`;

                    const formDiv = document.getElementById('scanActionForm');
                    if (meter.status === 'in-stock') {
                        formDiv.innerHTML = `
                            <div style="margin-top:12px; border-top:1px solid #eee; padding-top:12px;">
                                <div class="form-group"><label class="form-label">借用人姓名 *</label><input type="text" class="form-input borrow-name" placeholder="姓名"></div>
                                <div class="form-group"><label class="form-label">借用人编号</label><input type="text" class="form-input borrow-id" placeholder="工号"></div>
                                <div class="form-group"><label class="form-label">借用地点 *</label><input type="text" class="form-input borrow-location" placeholder="例如：3号车间"></div>
                                <button class="btn btn-primary btn-block btn-borrow-submit">✅ 确认借用</button>
                            </div>`;
                        formDiv.querySelector('.btn-borrow-submit').addEventListener('click', async () => {
                            const name = formDiv.querySelector('.borrow-name').value.trim();
                            const id = formDiv.querySelector('.borrow-id').value.trim();
                            const loc = formDiv.querySelector('.borrow-location').value.trim();
                            if (!name || !loc) { showToast('请填写借用人姓名和借用地点', 'error'); return; }
                            meter.status = 'borrowed'; meter.location = loc;
                            records.unshift({
                                id: generateId(),
                                meterId: meter.assetNo,
                                assetNo: meter.assetNo,
                                meterName: meter.name,
                                borrowerId: id,
                                borrowerName: name,
                                borrowLocation: loc,
                                borrowTime: Date.now(),
                                returnTime: null,
                                status: 'borrowed'
                            });
                            await saveMeters(meters);
                            await saveRecords(records);
                            showToast('借用登记成功', 'success');
                            processAssetQuery(meter.assetNo);
                            updateStats();
                            renderDashboard();
                        });
                    } else {
                        const activeRec = records.find(r => r.assetNo === meter.assetNo && r.status === 'borrowed');
                        formDiv.innerHTML = `
                            <div style="margin-top:12px; border-top:1px solid #eee; padding-top:12px;">
                                <p><strong>当前借用人：</strong>${activeRec?.borrowerName || '未知'}</p>
                                <button class="btn btn-success btn-block btn-return-submit">🔄 归还仪表</button>
                            </div>`;
                        formDiv.querySelector('.btn-return-submit').addEventListener('click', async () => {
                            meter.status = 'in-stock';
                            if (activeRec) { activeRec.returnTime = Date.now(); activeRec.status = 'returned'; }
                            await saveMeters(meters);
                            await saveRecords(records);
                            showToast('归还成功', 'success');
                            processAssetQuery(meter.assetNo);
                            updateStats();
                            renderDashboard();
                        });
                    }
                } catch (err) {
                    showToast('处理出错：' + err.message, 'error');
                }
            }

            document.getElementById('btnManualQuery').addEventListener('click', () => {
                processAssetQuery(document.getElementById('manualQrInput').value);
            });
            document.getElementById('manualQrInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') processAssetQuery(e.target.value);
            });

            // ---------- 摄像头扫描 ----------
            let html5QrCode = null;
            function updateScanStatus(msg, isError=false) {
                const el = document.getElementById('scanStatusMsg');
                el.textContent = msg;
                el.style.color = isError ? '#d93025' : '#1a73e8';
            }
            document.getElementById('btnStartScan').addEventListener('click', () => {
                document.getElementById('scanPlaceholder').style.display = 'none';
                updateScanStatus('正在打开摄像头...');
                if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 5, qrbox: { width: 280, height: 280 } },
                    (decodedText) => {
                        updateScanStatus('✅ 扫描成功！');
                        showToast('扫描成功', 'success');
                        document.getElementById('manualQrInput').value = decodedText;
                        processAssetQuery(decodedText);
                        html5QrCode.stop().then(() => {
                            document.getElementById('btnStartScan').style.display = 'inline-flex';
                            document.getElementById('btnStopScan').style.display = 'none';
                        }).catch(()=>{});
                    },
                    (errorMessage) => {
                        if (errorMessage && errorMessage.includes('No QR code found')) {
                            updateScanStatus('📷 正在寻找二维码...');
                        } else if (errorMessage) {
                            updateScanStatus('识别失败: ' + errorMessage, true);
                        }
                    }
                ).then(() => {
                    document.getElementById('btnStartScan').style.display = 'none';
                    document.getElementById('btnStopScan').style.display = 'inline-flex';
                    updateScanStatus('摄像头已启动，请对准二维码');
                }).catch(err => {
                    updateScanStatus('启动失败: ' + (err.message || err), true);
                    showToast('摄像头启动失败', 'error');
                });
            });
            document.getElementById('btnStopScan').addEventListener('click', () => {
                if (html5QrCode) {
                    html5QrCode.stop().then(() => {
                        document.getElementById('btnStartScan').style.display = 'inline-flex';
                        document.getElementById('btnStopScan').style.display = 'none';
                        document.getElementById('scanPlaceholder').style.display = 'block';
                        updateScanStatus('');
                    }).catch(()=>{});
                }
            });

            // ---------- 借用记录 ----------
            function renderRecords(searchTerm='') {
                const listEl = document.getElementById('recordList'), emptyEl = document.getElementById('emptyRecords');
                let filtered = records;
                if (searchTerm) {
                    const t = searchTerm.toLowerCase();
                    filtered = filtered.filter(r => r.assetNo.toLowerCase().includes(t) || r.borrowerName.toLowerCase().includes(t));
                }
                if (filtered.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; }
                else {
                    emptyEl.style.display = 'none';
                    listEl.innerHTML = filtered.map(r => `
                        <div class="card" style="font-size:0.9rem;">
                            <div><strong>${r.assetNo}</strong> ${r.meterName||''}</div>
                            <div>借用人: ${r.borrowerName} (${r.borrowerId||'-'})</div>
                            <div>借用地点: ${r.borrowLocation}</div>
                            <div>借用时间: ${formatTime(r.borrowTime)}</div>
                            <div>归还时间: ${r.returnTime ? formatTime(r.returnTime) : '<span style="color:#e67e22">未归还</span>'}</div>
                        </div>`).join('');
                }
            }
            document.getElementById('searchRecord').addEventListener('input', e => renderRecords(e.target.value));
            document.getElementById('btnExportCSV').addEventListener('click', () => {
                let csv = '资产号,仪表名称,借用人,借用人编号,借用地点,借用时间,归还时间,状态\n';
                records.forEach(r => { csv += `${r.assetNo},${r.meterName},${r.borrowerName},${r.borrowerId||''},${r.borrowLocation},${formatTime(r.borrowTime)},${r.returnTime?formatTime(r.returnTime):''},${r.status}\n`; });
                const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href=url; a.download='借用记录.csv'; a.click(); URL.revokeObjectURL(url);
                showToast('导出成功', 'success');
            });

            // ---------- 管理页 ----------
            function renderManageMeterList() {
                const listEl = document.getElementById('manageMeterList');
                listEl.innerHTML = meters.map(m => `
                    <div class="meter-item" data-asset="${m.assetNo}">
                        <div class="meter-avatar">📟</div>
                        <div class="meter-info"><div class="meter-name">${m.name||'未命名'}</div><div class="meter-asset">${m.assetNo} | ${m.model||''} | ${m.user||''}</div></div>
                        <span class="meter-status-tag ${m.status==='in-stock'?'tag-in-stock':'tag-borrowed'}">${m.status==='in-stock'?'在库':'借出'}</span>
                    </div>`).join('');
                listEl.querySelectorAll('.meter-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const meter = meters.find(m => m.assetNo === item.dataset.asset);
                        if (meter) {
                            document.getElementById('editMeterId').value = meter.assetNo;
                            document.getElementById('formAssetNo').value = meter.assetNo || '';
                            document.getElementById('formName').value = meter.name || '';
                            document.getElementById('formModel').value = meter.model || '';
                            document.getElementById('formSerial').value = meter.serial || '';
                            document.getElementById('formYear').value = meter.year || '';
                            document.getElementById('formDept').value = meter.dept || '';
                            document.getElementById('formUser').value = meter.user || '';
                            document.getElementById('formLocation').value = meter.location || '';
                        }
                    });
                });
            }
            document.getElementById('meterForm').addEventListener('submit', async e => {
                e.preventDefault();
                const assetNo = document.getElementById('formAssetNo').value.trim();
                if (!assetNo) { showToast('资产号必填', 'error'); return; }
                const data = {
                    assetNo,
                    name: document.getElementById('formName').value.trim(),
                    model: document.getElementById('formModel').value.trim(),
                    serial: document.getElementById('formSerial').value.trim(),
                    year: document.getElementById('formYear').value.trim(),
                    dept: document.getElementById('formDept').value.trim(),
                    user: document.getElementById('formUser').value.trim(),
                    location: document.getElementById('formLocation').value.trim(),
                    status: 'in-stock'
                };
                const existingIndex = meters.findIndex(m => m.assetNo === assetNo);
                if (existingIndex >= 0) {
                    Object.assign(meters[existingIndex], data);
                } else {
                    meters.push(data);
                }
                await saveMeters(meters);
                updateStats();
                renderManageMeterList();
                renderDashboard();
                document.getElementById('meterForm').reset();
                document.getElementById('editMeterId').value = '';
                showToast('保存成功', 'success');
            });
            document.getElementById('btnClearForm').addEventListener('click', () => {
                document.getElementById('meterForm').reset();
                document.getElementById('editMeterId').value = '';
            });
            document.getElementById('btnAddSample').addEventListener('click', async () => {
                meters = [
                    { assetNo: 'METER-001', name: '精密压力表', model: 'A型-0.1级', serial: 'SN001', year: '2022', dept: '实验室', user: '张三', location: '实验室A-柜3', status: 'in-stock' },
                    { assetNo: 'METER-002', name: '数字万用表', model: 'B型-FLUKE', serial: 'SN002', year: '2023', dept: '研发部', user: '李四', location: '实验室B-柜1', status: 'in-stock' },
                    { assetNo: 'METER-003', name: '温度传感器', model: 'PT100-A', serial: 'SN003', year: '2021', dept: '生产部', user: '王五', location: '3号车间', status: 'borrowed' }
                ];
                await saveMeters(meters);
                updateStats();
                renderManageMeterList();
                renderDashboard();
                showToast('已添加示例仪表', 'info');
            });
            document.getElementById('btnClearAll').addEventListener('click', async () => {
                if (confirm('确定清空所有仪表和记录吗？')) {
                    meters = []; records = [];
                    await saveMeters(meters);
                    await saveRecords(records);
                    updateStats();
                    renderManageMeterList();
                    renderDashboard();
                    renderRecords();
                    showToast('已清空', 'warning');
                }
            });

            // ---------- 初始化 ----------
            async function initApp() {
                meters = await loadMeters();
                records = await loadRecords();
                // 如果没有仪表，写入示例数据
                if (meters.length === 0) {
                    meters = [
                        { assetNo: 'METER-001', name: '精密压力表', model: 'A型-0.1级', serial: 'SN001', year: '2022', dept: '实验室', user: '张三', location: '实验室A-柜3', status: 'in-stock' },
                        { assetNo: 'METER-002', name: '数字万用表', model: 'B型-FLUKE', serial: 'SN002', year: '2023', dept: '研发部', user: '李四', location: '实验室B-柜1', status: 'in-stock' }
                    ];
                    await saveMeters(meters);
                }
                updateStats();
                renderDashboard();
                renderRecords();
                renderManageMeterList();
                handleUrlParams();
            }

            function handleUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const asset = params.get('asset');
                if (asset) {
                    switchPage('page-scan');
                    document.getElementById('manualQrInput').value = asset;
                    processAssetQuery(asset);
                }
            }

            window.addEventListener('DOMContentLoaded', initApp);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(()=>{});
            }
        })();
    </script>
</body>
</html>
